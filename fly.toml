# fly.toml - Fly.io deployment configuration
# Deploy with: fly launch (first time) or fly deploy (updates)

app = "provincial-svar"
primary_region = "yyz"  # Toronto - closest to Canadian data sources

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3838
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[http_service.concurrency]
  type = "connections"
  hard_limit = 25
  soft_limit = 20

# Longer grace period for initial data load
[[http_service.checks]]
  grace_period = "120s"
  interval = "30s"
  timeout = "10s"
  method = "GET"
  path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048  # More RAM for R + data loading

[mounts]
  source = "svar_cache"
  destination = "/srv/shiny-server/provincial-svar/cache"
